spring.application.name=api-exam-enunciat
server.servlet.context-path=/api
server.port=8086

application.security.jwt.secret-key=1234abcd1234abcd1234abcd1234abcd1234abcd1234abcd1234abcd1234abcd
application.security.jwt.expiration=300
application.security.jwt.issuer=cantina

spring.datasource.url=jdbc:h2:mem:cantinadb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true